name: Deploy PWA to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js securely
        run: |
          mkdir -p js
          echo "window.APP_CONFIG = {" > js/config.js
          echo "    SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'," >> js/config.js
          echo "    SUPABASE_KEY: '${{ secrets.SUPABASE_KEY }}'" >> js/config.js
          echo "};" >> js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
