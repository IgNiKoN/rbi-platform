<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBI Quality — Отчёт</title>
    <meta name="theme-color" content="#1c2b39">

    <script src="./libs/supabase-js.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #f1f5f9;
            color: #0f172a;
            font-family: Arial, sans-serif;
        }

        #status {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            box-sizing: border-box;
        }

        .box {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 24px;
            max-width: 460px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .title {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #1c2b39;
            margin-bottom: 8px;
        }

        .text {
            font-size: 13px;
            line-height: 1.5;
            color: #64748b;
            font-weight: 700;
        }

        #report-root {
            background: white;
            min-height: 100vh;
            padding: 16px;
            box-sizing: border-box;
        }

        @media print {
            body {
                background: white;
            }

            #report-root {
                padding: 0;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="status">
        <div class="box">
            <div class="title">RBI Quality</div>
            <div class="text">Загрузка отчёта...</div>
        </div>
    </div>

    <div id="report-root" style="display:none;"></div>

    <script>
        const APP_CONFIG = {
            SUPABASE_URL: 'https://api.rbi-q.ru',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc3NTA3MjAwLCJleHAiOjE5MzUyNzM2MDB9.f2s_pInfJu74ptaavpJx7J3I6Arwavcjnkzl1z39wPk'
        };

        function showStatus(title, text) {
            document.getElementById('status').style.display = 'flex';
            document.getElementById('report-root').style.display = 'none';
            document.getElementById('status').innerHTML = `
                <div class="box">
                    <div class="title">${title}</div>
                    <div class="text">${text}</div>
                </div>
            `;
        }

        async function loadReport() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showStatus('Отчёт не найден', 'В ссылке отсутствует токен отчёта.');
                return;
            }

            try {
                const client = supabase.createClient(APP_CONFIG.SUPABASE_URL, APP_CONFIG.SUPABASE_KEY);

                const { data, error } = await client.rpc('get_public_report_by_token', {
                    p_token: token
                });

                if (error) throw error;

                if (!data || data.length === 0) {
                    showStatus('Отчёт недоступен', 'Ссылка недействительна, отчёт удалён или срок доступа истёк.');
                    return;
                }

                const report = data[0];

                document.getElementById('status').style.display = 'none';
                const root = document.getElementById('report-root');
                root.style.display = 'block';
                root.innerHTML = report.html_content;

                document.title = 'RBI Quality — Отчёт';

            } catch (e) {
                console.error(e);
                showStatus('Ошибка загрузки', 'Не удалось загрузить отчёт. Проверьте подключение к интернету.');
            }
        }

        loadReport();
    </script>
</body>
</html>
