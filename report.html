<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBI Quality — Отчёт</title>
    <meta name="theme-color" content="#1c2b39">

    <script src="./libs/supabase-js.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #f1f5f9;
            color: #0f172a;
            font-family: Arial, sans-serif;
        }

        #status {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            box-sizing: border-box;
        }

        .box {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 24px;
            max-width: 460px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .title {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #1c2b39;
            margin-bottom: 8px;
        }

        .text {
            font-size: 13px;
            line-height: 1.5;
            color: #64748b;
            font-weight: 700;
        }

        #report-root {
            background: white;
            min-height: 100vh;
            padding: 16px;
            box-sizing: border-box;
        }

        .report-viewer {
            max-width: 1180px;
            margin: 0 auto;
            background: #ffffff;
        }

        .report-viewer img {
            max-width: 100%;
            height: auto;
            cursor: zoom-in;
        }

        .report-viewer table {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            #report-root {
                padding: 8px;
                overflow-x: hidden;
            }

            .report-viewer {
                width: 100%;
                max-width: 100%;
                overflow-x: hidden;
            }

            .report-viewer table,
            .report-viewer tbody,
            .report-viewer tr,
            .report-viewer td,
            .report-viewer th {
                display: block !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }

            .report-viewer td,
            .report-viewer th {
                padding-left: 0 !important;
                padding-right: 0 !important;
                margin-bottom: 10px !important;
            }

            .report-viewer div {
                max-width: 100% !important;
                box-sizing: border-box !important;
            }

            .report-viewer img {
                max-width: 100% !important;
                cursor: zoom-in;
            }

            .report-viewer img.report-photo-mobile {
                width: auto !important;
                max-width: 100% !important;
                height: auto !important;
                max-height: 240px !important;
                object-fit: contain !important;
                display: block !important;
                margin: 0 auto !important;
                border-radius: 10px;
                background: #f8fafc;
            }

            .report-viewer .report-photo-mobile-box {
                height: auto !important;
                min-height: 0 !important;
                max-height: none !important;
                overflow: visible !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                padding: 6px !important;
                background: #f8fafc !important;
            }

            .report-viewer .report-photo-mobile-card {
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
            }

            .report-viewer .report-photo-mobile-caption {
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
            }
        }

        @media print {
            body {
                background: white;
            }

            #report-root {
                padding: 0;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="status">
        <div class="box">
            <div class="title">RBI Quality</div>
            <div class="text">Загрузка отчёта...</div>
        </div>
    </div>

    <div id="report-root" style="display:none;"></div>

    <script>
        const APP_CONFIG = {
            SUPABASE_URL: 'https://api.rbi-q.ru',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc3NTA3MjAwLCJleHAiOjE5MzUyNzM2MDB9.f2s_pInfJu74ptaavpJx7J3I6Arwavcjnkzl1z39wPk'
        };

        function showStatus(title, text) {
            document.getElementById('status').style.display = 'flex';
            document.getElementById('report-root').style.display = 'none';
            document.getElementById('status').innerHTML = `
                <div class="box">
                    <div class="title">${title}</div>
                    <div class="text">${text}</div>
                </div>
            `;
        }
        function enableImageViewer(root) {
    if (!root) return;

    let overlay = document.getElementById('image-viewer-overlay');

    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'image-viewer-overlay';
        overlay.style.cssText = `
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.94);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            cursor: zoom-out;
        `;

        overlay.innerHTML = `
            <img id="image-viewer-img" src="" style="
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0,0,0,.45);
                background: white;
            ">
        `;

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            document.getElementById('image-viewer-img').src = '';
            document.body.style.overflow = '';
        });

        document.body.appendChild(overlay);
    }

    const isUtilityImage = (img) => {
        const src = String(img.getAttribute('src') || '').toLowerCase();
        const alt = String(img.getAttribute('alt') || '').toLowerCase();
        const parentText = String(img.closest('td, div')?.textContent || '').toLowerCase();

        return (
            src.includes('qr') ||
            src.includes('logo') ||
            alt.includes('qr') ||
            alt.includes('logo') ||
            parentText.includes('сформировано')
        );
    };

    root.querySelectorAll('img').forEach((img) => {
        if (isUtilityImage(img)) return;

        img.classList.add('report-photo-mobile');

        const photoBox = img.parentElement;
        if (photoBox) {
            photoBox.classList.add('report-photo-mobile-box');

            const card = photoBox.parentElement;
            if (card) {
                card.classList.add('report-photo-mobile-card');

                const caption = card.querySelector('div:last-child');
                if (caption && caption !== photoBox) {
                    caption.classList.add('report-photo-mobile-caption');
                }
            }
        }

        img.addEventListener('click', (e) => {
            e.stopPropagation();

            const src = img.getAttribute('src');
            if (!src) return;

            document.getElementById('image-viewer-img').src = src;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });
    });
}
        async function loadReport() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token') || params.get('id');

            if (!token) {
                showStatus('Отчёт не найден', 'В ссылке отсутствует токен отчёта.');
                return;
            }

            try {
                const client = supabase.createClient(APP_CONFIG.SUPABASE_URL, APP_CONFIG.SUPABASE_KEY);

                const { data, error } = await client.rpc('get_public_report_by_token', {
                    p_token: token
                });

                if (error) throw error;

                if (!data || data.length === 0) {
                    showStatus('Отчёт недоступен', 'Ссылка недействительна, отчёт удалён или срок доступа истёк.');
                    return;
                }

                const report = data[0];

                document.getElementById('status').style.display = 'none';
                const root = document.getElementById('report-root');
                root.style.display = 'block';
                root.innerHTML = `<div class="report-viewer">${report.html_content}</div>`;
                enableImageViewer(root);
                document.title = 'RBI Quality — Отчёт';

            } catch (e) {
                console.error(e);
                showStatus('Ошибка загрузки', 'Не удалось загрузить отчёт. Проверьте подключение к интернету.');
            }
        }

        loadReport();
    </script>
</body>

</html>
